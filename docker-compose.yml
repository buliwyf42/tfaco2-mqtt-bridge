services:
  tfaco2-mqtt:
    image: ghcr.io/buliwyf42/tfaco2-mqtt-bridge:latest
    container_name: tfaco2-mqtt
    restart: unless-stopped
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASS: ${MQTT_PASS}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-CO2}
      HA_PREFIX: ${HA_PREFIX:-homeassistant}
      HA_DISCOVERY_ENABLED: ${HA_DISCOVERY_ENABLED:-true}
      DEVICE_ID: ${DEVICE_ID:-co2meter_tfaco2}
      DEVICE_NAME: ${DEVICE_NAME:-TFA CO2 Meter}
      DEVICE_MODEL: ${DEVICE_MODEL:-TFACO2 AirCO2ntrol}
      DEVICE_MANUFACTURER: ${DEVICE_MANUFACTURER:-TFA}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-co2meter_tfaco2-bridge}
      MQTT_KEEPALIVE: ${MQTT_KEEPALIVE:-60}
      DEVICE_PATH: ${DEVICE_PATH:-/dev/hidraw0}
      # TLS (optional, uncomment to enable)
      # MQTT_TLS_ENABLED: ${MQTT_TLS_ENABLED:-false}
      # MQTT_TLS_INSECURE: ${MQTT_TLS_INSECURE:-false}
      # MQTT_TLS_CA_CERT: ${MQTT_TLS_CA_CERT:-/certs/ca.crt}
      # MQTT_TLS_CERTFILE: ${MQTT_TLS_CERTFILE:-/certs/client.crt}
      # MQTT_TLS_KEYFILE: ${MQTT_TLS_KEYFILE:-/certs/client.key}
    devices:
      - "${DEVICE_PATH:-/dev/hidraw0}:${DEVICE_PATH:-/dev/hidraw0}"
    # volumes:
    #   - ./certs:/certs:ro
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/heartbeat && test $(( $(date +%s) - $(date +%s -r /tmp/heartbeat) )) -lt 300"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
